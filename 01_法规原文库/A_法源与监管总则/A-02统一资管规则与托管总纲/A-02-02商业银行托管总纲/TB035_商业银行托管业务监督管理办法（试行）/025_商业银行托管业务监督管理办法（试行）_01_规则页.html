    <div  style="display: none">
        <img src="/cn/static/images/share.jpg"   />
    </div>
    
    <div class="main ng-cloak  bodyclass" ng-app="myApp">
        <!-- <tpl src="/cn/view/components/Header.html"></tpl> -->
        <!-- 调用一个没有内容的nav模块，解决页面底部联系方式链接获取不到的问题 -->
        <div class="nav" ng-controller="navCtrl"></div> 
        <div class="content " ng-controller="rulesDetile">
            <link href="/cn/css/common/share.css?v=20200108" rel="stylesheet" />
            
            <div class="container main-box">
                <!-- <div class="breadcrumb" style="margin-left: 10px">
                    <ul>
                        <li>当前位置：
                            <a href="/cn/view/pages/index/index.html">首页</a>
                        </li>
                        <li ng-repeat="x in breadcrumb_detail">
                            <a ng-href="{{x|breadcrumbitemUrl}}">{{x.itemName}}&nbsp;</a>
                        </li>
                    </ul>
                </div> -->
                <div class="rules-header">
                <a id="toolbarSwitch" class="gz-wza" href="javascript:void(0);">无障碍浏览</a>
                   <div class="row pages-title">
                        
                          <div class="pages-title-red">
                          <a href="/cn/view/pages/zhengwuxinxi/guizhang.html" style="color: red;"><img class="guohui" src="/cn/static/images/gh.png" /> {{rulesTitle}}规章</a></div> 
                        
                        <div class="down-xz" ><span ng-click="rulesDocFileDownload(1)">下载文字版</span> <span ng-click="rulesDocFileDownload(2)">下载图片版</span></div>
                    </div>
                </div>
                <div class="main-container">

                    <div class="row pages-dateprint">
                        <div class="wenzhang-title ng-binding"
                            ng-bind-html="docTitle|trustHtml"></div>
                        <!--题注-->
                        <div class="tizhu"><div class="tizhu-title" ng-if="caption" >{{caption}}</div></div>
                        <!-- 文章详情内容显示区域 -->
                        <div id="wenzhang-content" class="iswhite-space" ng-bind-html="texthtml|trustHtml">
                        </div>
                        <div class="fujian" ng-show="data.attachmentInfoVOList[0].title!=null || editSubContent">
                          <div class="wenzhang-fujian" style="margin-left:0;" ng-hide="data.attachmentInfoVOList[0].title==null">
                              <div>附件信息:</div>
                              <ul>
                                  <li ng-repeat="x in data.attachmentInfoVOList">
                                      <a ng-href="{{x.urlOtherName}}">{{x.title}}</a>
                                      <!-- <a ng-click="fileDownload(x.urlOtherName)">{{x.title}}</a> -->
                                  </li>
                              </ul>
                          </div>
                          <div id="appendix" class="ng-cloak" ng-cloak ng-repeat="item in editSubContent track by $index"
                                        ng-show="editSubContent"
                                        style="margin-top:23px;font-size:16px;color:#333">
                                        <div>{{item.title}}</div>
                                        <a style="color: blue;font-size:16px;" ng-href="{{item.href}}" target="_blank">{{item.href}}</a>
                          </div>
                        </div>
                    </div>
                    <div>
                        <div class="row">
                            <div ng-show="generaltype==1" class="mb25">
                        </div>
                    </div>
                </div>
                
            
            
        </div>
