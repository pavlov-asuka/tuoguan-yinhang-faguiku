<script type="text/javascript">
$(function(){
	var liheight=$('.slide ul li img').width();
	$(".slide ul>li:first").clone().appendTo(".slide ul"); // 复制当前点击的节点，并将它追加到<ul>元素
	var num=0;
	function autoplay(){
		if(num<$('.slide ul>li').length){
			num++;
			$('.slide ul').animate({left:-liheight*num},200);
			if(num==2){
				$('.slide ul').animate({left:0},0);
				num=0;
			}
		}
	//console.debug(num,$('.slide ul>li').length);
		
	}//制作定时函数
	var mytime=setInterval(autoplay,3500)//定时启动
	
})
</script>
